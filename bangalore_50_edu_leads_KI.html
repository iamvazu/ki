  {n:"ISRO / VSSC Training Centre (Bangalore)",loc:"Peenya / Yelhanka",type:"Other",priority:"A",budget:"₹1–3 Cr",budgetV:4,contact:"Admin Officer",contactRole:"Section Head (Stores & Purchase)",naac:"N/A",students:2000,tip:"Government research and training institution. GeM portal mandatory. Very large infrastructure budget. Training rooms, conference rooms, offices. Procurement is through Section Head (Stores). Long tender cycles but very high value.",spaces:"Training rooms, conference rooms, offices, labs",gems:true},
];

let activeFilter = 'all';

function typeClass(t) {
  if(t==='Engineering') return 't-eng';
  if(t==='University') return 't-univ';
  if(t==='Medical') return 't-med';
  if(t==='Management') return 't-mgmt';
  if(t==='School') return 't-school';
  return 't-other';
}

function priorityClass(p) {
  if(p==='A+') return 'p-high';
  if(p==='A') return 'p-med';
  return 'p-low';
}

function barColor(v) {
  if(v>=4) return 'var(--color-text-success)';
  if(v>=2) return 'var(--color-text-warning)';
  return 'var(--color-border-secondary)';
}

function renderTable() {
  const search = document.getElementById('search-input').value.toLowerCase();
  const body = document.getElementById('leads-body');
  let count = 0;
  body.innerHTML = '';
  leads.forEach((l, i) => {
    const matchType = activeFilter === 'all' || l.type === activeFilter;
    const matchSearch = l.n.toLowerCase().includes(search) || l.loc.toLowerCase().includes(search) || l.contact.toLowerCase().includes(search);
    if(!matchType || !matchSearch) return;
    count++;
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td style="color:var(--color-text-secondary);font-size:11px;">${i+1}</td>
      <td><div class="inst-name">${l.n}${l.gems ? ' <span title="GeM required" style="font-size:10px;color:var(--color-text-info);">🏛</span>' : ''}</div><div class="inst-loc">${l.loc}</div></td>
      <td><span class="badge ${typeClass(l.type)}">${l.type}</span></td>
      <td><span class="${priorityClass(l.priority)}">${l.priority}</span></td>
      <td><div style="white-space:nowrap;">${l.budget}</div><div class="budget-bar" style="width:${l.budgetV*20}%;background:${barColor(l.budgetV)};"></div></td>
      <td style="color:var(--color-text-secondary);">${l.contact}</td>
    `;
    tr.onclick = () => showModal(l, i+1);
    body.appendChild(tr);
  });
  document.getElementById('count-label').textContent = `Showing ${count}`;
}

function setFilter(f, btn) {
  activeFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderTable();
}

function applyFilters() { renderTable(); }

function showModal(l, num) {
  const c = document.getElementById('modal-container');
  c.innerHTML = `
    <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;">
          <div>
            <div class="modal-title">${num}. ${l.n}</div>
            <div class="modal-sub">${l.loc} &nbsp;·&nbsp; <span class="badge ${typeClass(l.type)}">${l.type}</span></div>
          </div>
          <span class="modal-close" onclick="closeModal()">×</span>
        </div>
        <div style="border-top:0.5px solid var(--color-border-tertiary);padding-top:12px;">
          <div class="modal-row"><div class="modal-label">Priority tier</div><div class="modal-val"><strong class="${priorityClass(l.priority)}">${l.priority}</strong></div></div>
          <div class="modal-row"><div class="modal-label">Est. furniture budget</div><div class="modal-val">${l.budget} per cycle</div></div>
          <div class="modal-row"><div class="modal-label">Student population</div><div class="modal-val">${l.students.toLocaleString()}</div></div>
          <div class="modal-row"><div class="modal-label">NAAC grade</div><div class="modal-val">${l.naac}</div></div>
          <div class="modal-row"><div class="modal-label">First contact</div><div class="modal-val"><strong>${l.contact}</strong></div></div>
          <div class="modal-row"><div class="modal-label">Decision maker</div><div class="modal-val">${l.contactRole}</div></div>
          <div class="modal-row"><div class="modal-label">GeM required</div><div class="modal-val">${l.gems ? '✅ Yes — GeM portal mandatory' : 'Not required (private institution)'}</div></div>
          <div class="modal-row"><div class="modal-label">Key spaces</div><div class="modal-val">${l.spaces}</div></div>
          <div class="modal-row" style="margin-top:4px;"><div class="modal-label">Agent tip</div><div class="modal-val" style="font-style:italic;color:var(--color-text-secondary);">${l.tip}</div></div>
        </div>
        <div class="modal-actions">
          <button class="action-btn" onclick="sendPrompt('Write a personalised cold outreach email for KI furniture targeting ${l.n} in Bangalore — contact: ${l.contact}')">Draft outreach email ↗</button>
          <button class="action-btn" onclick="sendPrompt('What is the procurement process at ${l.n} and who are the key decision makers I need to reach?')">Research this institution ↗</button>
          <button class="action-btn" onclick="closeModal()">Close</button>
        </div>
      </div>
    </div>`;
}

function closeModal() {
  document.getElementById('modal-container').innerHTML = '';
}

renderTable();
</script>
